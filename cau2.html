<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>câu 2</title>
</head>
<body>

<script>
    function countUpper(str) {
        let count = 0;
        for (let i = 0; i < str.length; i++) {
            if (str[i] >= "A" && str[i] <= "Z") {
                count++;
            }
        }

        if (count > 0) {
            return count;
        } else {
            return "The Strings is not contain upper char";
        }
    }

    let inputStr = prompt("Nhập chuỗi:");
    alert(countUpper(inputStr));
</script>

</body>
</html>
